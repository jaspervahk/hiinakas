name: GTO Training

# Runs every 10 minutes automatically, or manually from GitHub Actions tab.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      games:
        description: 'Self-play games per iteration'
        default: '5000'
      epochs:
        description: 'Training epochs'
        default: '8'

env:
  # MCTS depth-2 with 30 sims is ~5× slower per decision than depth-1 NN.
  # 1000 games × 10 decisions × 30 sims ≈ same wall-time as 5000 depth-1 games.
  GAMES: ${{ github.event.inputs.games || '1000' }}
  EPOCHS: ${{ github.event.inputs.epochs || '8' }}
  MCTS_SIMS: '60'
  # Sliding window: train on the last N batches from the rolling data cache.
  # 5 batches × ~20K samples = ~100K samples per training run, 5× more diverse
  # than training on one batch. Epochs reduced proportionally so total gradient
  # steps stay similar (5 × 39 batches × 8 epochs ≈ 1560 vs 39 × 30 = 1170 previously).
  WINDOW: '5'

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore training data cache
        uses: actions/cache@v4
        with:
          path: data/
          # Unique key per run so the updated data/ is always saved.
          # restore-keys falls back to the most recent matching cache.
          key: training-data-${{ github.run_number }}
          restore-keys: |
            training-data-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download current deployed model (warm-start)
        # Fetch the latest model from Firebase Hosting for iterative self-play.
        # Firebase's SPA catch-all rewrite returns index.html (200) for missing
        # paths, so we can't rely on the HTTP status code alone — we verify the
        # OFCW magic bytes and discard the file if it's not a real model.
        run: |
          mkdir -p models
          curl -sf https://hiinakas-355.web.app/models/policy.bin -o models/policy.bin || true
          python3 - <<'EOF'
          import os, sys
          path = 'models/policy.bin'
          try:
              with open(path, 'rb') as f:
                  magic = f.read(4)
              if magic == b'OFCW':
                  size = os.path.getsize(path)
                  print(f'Downloaded valid model ({size // 1024} KB) — warm-starting')
              else:
                  os.remove(path)
                  print(f'Downloaded file is not a valid OFCW model (magic={magic!r}) — first run, using heuristic')
          except FileNotFoundError:
              print('No model file — first run, using heuristic policy')
          EOF

      - name: Self-play (MCTS depth-2)
        run: |
          mkdir -p data
          npx tsx scripts/selfplay.ts \
            --games "$GAMES" \
            --players 2 \
            --mcts-sims "$MCTS_SIMS" \
            --out data/batch_${{ github.run_number }}.bin
          # Keep only the most recent 10 batches so the cache stays bounded (~420 MB).
          cd data && ls -t *.bin | tail -n +11 | xargs -r rm; cd ..
          echo "Data cache: $(ls data/*.bin 2>/dev/null | wc -l) batches, $(du -sh data/ 2>/dev/null | cut -f1)"

      - name: Train value network
        run: |
          python scripts/train.py \
            --data data/ \
            --window "$WINDOW" \
            --out models/policy.bin \
            --resume models/policy.bin \
            --epochs "$EPOCHS" \
            --batch 512

      - name: Build app
        # Build the full SPA so dist/ contains the app + model together.
        # Firebase client config is public by design (visible in any browser).
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAZJ6kZHk--spDOJg3YqYzukftMXr0JYdA
          VITE_FIREBASE_AUTH_DOMAIN: hiinakas-355.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: hiinakas-355
          VITE_FIREBASE_STORAGE_BUCKET: hiinakas-355.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "17827635816"
          VITE_FIREBASE_APP_ID: 1:17827635816:web:fdfd222e409323ac6cd1dd
          VITE_ALLOWED_UID: 7d3zgIRy43OClSXUDhnsLmhDNwg2
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools --ignore-scripts

      - name: Deploy model + app via Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          mkdir -p dist/models
          cp models/policy.bin dist/models/policy.bin
          firebase deploy --only hosting \
            --token "$FIREBASE_TOKEN" \
            --non-interactive \
            --project hiinakas-355

      - name: Report
        run: |
          SIZE=$(wc -c < models/policy.bin)
          echo "Model size: $(( SIZE / 1024 )) KB"
          echo "Run ${{ github.run_number }} complete — model deployed to https://hiinakas-355.web.app/models/policy.bin"
