name: GTO Training

# Runs every hour automatically, or manually from GitHub Actions tab.
# Hourly cron is far more reliable than */10 on GitHub's shared runners,
# and 3000 games/shard × 3 shards = 9000 games/run gives a much better
# compute-to-overhead ratio than the old 600-game runs.
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      games:
        description: 'Self-play games per shard (total = shards × games)'
        default: '3000'
      epochs:
        description: 'Training epochs'
        default: '8'

env:
  # 3 parallel shards × GAMES games each = 9000 games per hourly cycle.
  # Shard seeds are spread across run_number so they don't produce duplicate data.
  GAMES: ${{ github.event.inputs.games || '3000' }}
  EPOCHS: ${{ github.event.inputs.epochs || '8' }}
  MCTS_SIMS: '100'
  # Train on the last 12 batches (≈ 4 runs × 3 shards = ~4 hours of history).
  # Prune keeps 18 batches (~6 runs) so the window is always satisfiable.
  WINDOW: '12'

jobs:
  # ── Self-play shards ──────────────────────────────────────────────────────────
  # Three shards run in parallel. Each produces one .bin batch file and uploads
  # it as an artifact. The training job downloads all three after they finish.
  # The WASM inference binary is committed to git — no Rust build step needed.
  selfplay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # if one shard fails, keep training with the others
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Download current deployed model (warm-start)
        run: |
          mkdir -p models
          curl -sf https://hiinakas-355.web.app/models/policy.bin -o models/policy.bin || true
          python3 - <<'EOF'
          import os
          path = 'models/policy.bin'
          try:
              with open(path, 'rb') as f:
                  magic = f.read(4)
              if magic == b'OFCW':
                  size = os.path.getsize(path)
                  print(f'Downloaded valid model ({size // 1024} KB) — warm-starting shard ${{ matrix.shard }}')
              else:
                  os.remove(path)
                  print('Downloaded file is not a valid OFCW model — using heuristic')
          except FileNotFoundError:
              print('No model available — first run, using heuristic policy')
          EOF

      - name: Self-play shard ${{ matrix.shard }}
        run: |
          mkdir -p data
          # Each shard gets a unique seed = run_number * 1000 + shard to avoid
          # duplicate game sequences across shards or across runs.
          npx tsx scripts/selfplay.ts \
            --games "$GAMES" \
            --players 2 \
            --mcts-sims "$MCTS_SIMS" \
            --seed $(( ${{ github.run_number }} * 1000 + ${{ matrix.shard }} )) \
            --out data/batch_${{ github.run_number }}_${{ matrix.shard }}.bin

      - name: Upload batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfplay-batch-${{ matrix.shard }}
          path: data/batch_${{ github.run_number }}_${{ matrix.shard }}.bin
          retention-days: 1

  # ── Train + deploy ────────────────────────────────────────────────────────────
  # Runs after all shards complete. Downloads the new batches, merges with the
  # rolling replay-buffer cache, trains, builds the app, and deploys.
  train-and-deploy:
    needs: selfplay
    if: always()   # run even if some shards failed, as long as at least one succeeded
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Restore training data cache (replay buffer)
        uses: actions/cache@v4
        with:
          path: data/
          # Unique key per run so the updated data/ is always saved.
          # restore-keys falls back to the most recent saved cache.
          key: training-data-${{ github.run_number }}
          restore-keys: |
            training-data-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download current deployed model (warm-start)
        run: |
          mkdir -p models
          curl -sf https://hiinakas-355.web.app/models/policy.bin -o models/policy.bin || true
          python3 - <<'EOF'
          import os
          path = 'models/policy.bin'
          try:
              with open(path, 'rb') as f:
                  magic = f.read(4)
              if magic == b'OFCW':
                  size = os.path.getsize(path)
                  print(f'Downloaded valid model ({size // 1024} KB) — warm-starting')
              else:
                  os.remove(path)
                  print('Downloaded file is not a valid OFCW model — first run, using heuristic')
          except FileNotFoundError:
              print('No model file — first run, using heuristic policy')
          EOF

      - name: Download self-play batches from all shards
        uses: actions/download-artifact@v4
        with:
          pattern: selfplay-batch-*
          path: data/
          merge-multiple: true

      - name: Prune old batches and report data cache
        run: |
          mkdir -p data
          # Keep last 18 batches (≈6 runs × 3 shards). Window=12 always has
          # enough data; the extra buffer handles failed/missing shards.
          cd data && ls -t *.bin 2>/dev/null | tail -n +19 | xargs -r rm; cd ..
          echo "Data: $(ls data/*.bin 2>/dev/null | wc -l) batches, $(du -sh data/ 2>/dev/null | cut -f1)"

      - name: Train value network
        run: |
          python scripts/train.py \
            --data data/ \
            --window "$WINDOW" \
            --out models/policy.bin \
            --resume models/policy.bin \
            --epochs "$EPOCHS" \
            --batch 512

      - name: Build app
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAZJ6kZHk--spDOJg3YqYzukftMXr0JYdA
          VITE_FIREBASE_AUTH_DOMAIN: hiinakas-355.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: hiinakas-355
          VITE_FIREBASE_STORAGE_BUCKET: hiinakas-355.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "17827635816"
          VITE_FIREBASE_APP_ID: 1:17827635816:web:fdfd222e409323ac6cd1dd
          VITE_ALLOWED_UID: 7d3zgIRy43OClSXUDhnsLmhDNwg2
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools --ignore-scripts

      - name: Deploy model + app via Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          mkdir -p dist/models
          cp models/policy.bin dist/models/policy.bin
          firebase deploy --only hosting \
            --token "$FIREBASE_TOKEN" \
            --non-interactive \
            --project hiinakas-355

      - name: Report
        run: |
          SIZE=$(wc -c < models/policy.bin)
          SHARDS=$(ls data/batch_${{ github.run_number }}_*.bin 2>/dev/null | wc -l)
          echo "Model: $(( SIZE / 1024 )) KB"
          echo "Run ${{ github.run_number }}: $SHARDS shard(s) × $GAMES games = $(( SHARDS * $GAMES )) new training games"
          echo "Deployed to https://hiinakas-355.web.app/models/policy.bin"
